<!DOCTYPE html>
<html>

<head>

<title>Aditya University - Smart Campus Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Page background */

body{
background:#f4f6f9;
font-family:Arial, sans-serif;
color:#333;
}

/* Navbar */

.navbar{
background:#2c3e50;
}

.navbar-brand{
color:#f4c542 !important;
font-weight:bold;
font-size:20px;
}

.nav-link{
color:white !important;
margin-left:15px;
font-weight:500;
}

.nav-link:hover{
color:#f4c542 !important;
}

/* Cards */

.glass-card{
background:white;
border-radius:16px;
padding:40px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* Feature boxes */

.feature-box{
border:1px solid #ddd;
border-radius:10px;
padding:20px;
text-align:center;
background:#fafafa;
transition:0.3s;
}

.feature-box:hover{
background:#f1f1f1;
transform:translateY(-3px);
}

/* Gold button */

.gold-btn{
background:#f4c542;
border:none;
color:white;
font-weight:bold;
padding:12px 25px;
border-radius:8px;
display:inline-block;
text-decoration:none;
}

.gold-btn:hover{
background:#d4aa33;
}
/* Chatbot floating icon */

#chatbot-icon{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#2d6cdf;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
z-index:999;
}

#chatbot-icon img{
width:35px;
}

/* Chatbot popup */

#chatbot-box{
position:fixed;
bottom:100px;
right:25px;
width:350px;
height:450px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:none;
overflow:hidden;
z-index:999;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="/dashboard">
Aditya University
</a>

<div>




<a class="nav-link d-inline" href="/logout">
Logout
</a>

</div>

</div>

</nav>

<div class="container mt-5">

{% block content %}

{% endblock %}

</div>
<!-- Chatbot icon -->

<div id="chatbot-icon" onclick="toggleChat()">

<img src="/static/images/chatbot.png">

</div>

<!-- Chatbot popup -->

<div id="chatbot-box">

<iframe src="/chatbot" width="100%" height="100%" style="border:none;"></iframe>

</div>
<script>

function toggleChat(){

let box=document.getElementById("chatbot-box");

if(box.style.display==="block"){
box.style.display="none";
}else{
box.style.display="block";
}

}

</script>
</body>

</html>
