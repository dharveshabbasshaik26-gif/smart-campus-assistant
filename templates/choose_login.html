<!DOCTYPE html>
<html>

<head>

<title>Aditya University - Smart Campus Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#eef2f7,#d9e2ec);
font-family:'Segoe UI',sans-serif;
}

/* login card */

.login-card{
background:white;
padding:50px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
text-align:center;
width:420px;
}

/* logo */

.logo{
width:200px;
margin-bottom:25px;
}

/* title */

.title{
font-size:32px;
font-weight:700;
color:#2c3e50;
margin-bottom:5px;
}

.subtitle{
color:#6c757d;
margin-bottom:35px;
}

/* buttons */

.btn-admin{
background:#2f80ed;
border:none;
color:white;
font-weight:600;
padding:14px;
border-radius:10px;
margin-bottom:15px;
width:100%;
font-size:16px;
transition:0.25s;
}

.btn-admin:hover{
background:#1c6cd5;
transform:translateY(-2px);
}

.btn-student{
background:#f1f3f5;
border:1px solid #dee2e6;
color:#333;
font-weight:600;
padding:14px;
border-radius:10px;
width:100%;
font-size:16px;
transition:0.25s;
}

.btn-student:hover{
background:#e9ecef;
}

</style>

</head>

<body>

<div class="login-card">

<img src="/static/images/aditya_logo.png" class="logo">

<div class="title">
Smart Campus Assistant
</div>

<p class="subtitle">
Select Login Type
</p>

<div>

<a href="/login" class="btn btn-admin">Admin Login</a>

<a href="/student_login" class="btn btn-student">Student Login</a>

</a>

</div>

</div>

</body>

</html>
