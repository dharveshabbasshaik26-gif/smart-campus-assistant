{% extends "layout.html" %}

{% block content %}

<div class="container">

<h2 class="mb-4">Edit Course</h2>

<div class="card shadow-sm">

<div class="card-body">

<form method="POST" action="/update_course/{{course.id}}">

<div class="mb-3">

<label class="form-label">Course Name</label>

<input type="text"
name="course"
value="{{course.course}}"
class="form-control"
required>

</div>


<div class="mb-3">

<label class="form-label">Fees</label>

<input type="text"
name="fees"
value="{{course.fees}}"
class="form-control">

</div>


<div class="mb-3">

<label class="form-label">Duration</label>

<input type="text"
name="duration"
value="{{course.duration}}"
class="form-control">

</div>


<div class="mb-3">

<label class="form-label">Eligibility</label>

<input type="text"
name="eligibility"
value="{{course.eligibility}}"
class="form-control">

</div>


<button class="btn btn-success">
Update Course
</button>

<a href="/dashboard/courses"
class="btn btn-secondary ms-2">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
