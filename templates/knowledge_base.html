{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">Knowledge Base</h2>

<div class="card shadow-sm p-4 mb-4">

<h5 class="mb-3">Add Question & Answer</h5>

<form method="POST" action="/add_kb">

<div class="mb-3">

<input 
type="text" 
name="question" 
class="form-control" 
placeholder="Enter Question"
required>

</div>

<div class="mb-3">

<textarea 
name="answer" 
class="form-control" 
rows="3"
placeholder="Enter Answer"
required></textarea>

</div>

<button type="submit" class="btn btn-primary">
Add Entry
</button>

</form>

</div>


<div class="card shadow-sm p-4">

<h5 class="mb-3">Knowledge Base Entries</h5>

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Question</th>
<th>Answer</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for entry in kb_entries %}

<tr>

<td>{{ entry.id }}</td>

<td>{{ entry.question }}</td>

<td>{{ entry.answer }}</td>

<td>
<a href="/edit_kb/{{ entry.id }}" class="btn btn-sm btn-warning">
Edit
</a>
<a href="/delete_kb/{{ entry.id }}" class="btn btn-sm btn-danger">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
