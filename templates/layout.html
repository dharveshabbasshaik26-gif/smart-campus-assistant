<!DOCTYPE html>
<html>

<head>

<title>Smart Campus Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
background:#2c3e50;
color:white;
position:fixed;
width:220px;
padding-top:20px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#34495e;
}

.main{
margin-left:220px;
padding:20px;
}
/* Chatbot floating icon */

#chatbot-icon{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#2d6cdf;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
z-index:999;
}

#chatbot-icon img{
width:35px;
}

/* Chatbot popup */

#chatbot-box{
position:fixed;
bottom:100px;
right:25px;
width:350px;
height:450px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:none;
overflow:hidden;
z-index:999;
}
</style>

</head>

<body>

<div class="sidebar">

<h4 class="text-center">Smart Campus Assistant</h4>
<a href="/dashboard">Dashboard</a>
<a href="/dashboard/courses">Courses</a>
<a href="/dashboard/facilities">Facilities</a>
<a href="/dashboard/students">Students</a>
<a href="/dashboard/knowledge_base">Knowledge Base</a>
<a href="/logout">Logout</a>

</div>

<div class="main">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
<div class="container-fluid">
<span class="navbar-brand mb-0 h1">Smart Campus Assistant</span>
</div>
</nav>

{% block content %}
{% endblock %}

</div>
<!-- Chatbot icon -->

<div id="chatbot-icon" onclick="toggleChat()">

<img src="/static/images/chatbot.png">

</div>

<!-- Chatbot popup -->

<div id="chatbot-box">

<iframe src="/chatbot" width="100%" height="100%" style="border:none;"></iframe>

</div>
<script>

function toggleChat(){

let box=document.getElementById("chatbot-box");

if(box.style.display==="block"){
box.style.display="none";
}else{
box.style.display="block";
}

}

</script>
</body>

</html>
