{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">Students Management</h2>

<div class="card shadow-sm p-4 mb-4">

<h5 class="mb-3">Add Student</h5>

<form method="POST" action="/add_student">

<div class="row g-3">

<div class="col-md-3">
<input type="text" name="username" class="form-control" placeholder="Username" required>
</div>

<div class="col-md-3">
<input type="password" name="password" class="form-control" placeholder="Password" required>
</div>

<div class="col-md-3">
<input type="text" name="name" class="form-control" placeholder="Student Name">
</div>

<div class="col-md-3">
<input type="email" name="email" class="form-control" placeholder="Email">
</div>

</div>

<div class="mt-3">
<button type="submit" class="btn btn-primary">
Add Student
</button>
</div>

</form>

</div>


<div class="card shadow-sm p-4">

<h5 class="mb-3">Student List</h5>

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Username</th>
<th>Name</th>
<th>Email</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for student in students %}

<tr>

<td>{{ student.id }}</td>
<td>{{ student.username }}</td>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>

<td>

<a href="/delete_student/{{ student.id }}" class="btn btn-sm btn-danger">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
